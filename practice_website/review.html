<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
</head>
<body>
    <h1>Leave a Review</h1>
    <form action="submit_review.html" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required minlength="3" maxlength="20">
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br>
        <label for="rating">Rating:</label>
        <select id="rating" name="rating" required>
            <option value="5">5 Stars</option>
            <option value="4">4 Stars</option>
            <option value="3">3 Stars</option>
            <option value="2">2 Stars</option>
            <option value="1">1 Star</option>
        </select>
        <br>
        <label for="review">Review:</label>
        <textarea id="review" name="review" placeholder="Enter your review" rows="4" cols="50" required></textarea>
        <br>
        <label for="CheckBox">Why you are learning programming?</label>
        <br>
        <input type="checkbox" id="Option-1" name="Programming" value='p'>
        <label for="Option-1">Programming</label>
        <input type="checkbox" id="Option-2" name="Problem Solving" value='ps'>
        <label for="Option-2">Problem Solving</label>
        <input type="checkbox" id="Option-3" name="Career Opportunities" value='co'>
        <label for="Option-3">Career Opportunities</label>
        <br>
        <label for="radio1">Are you a student?</label><br>
        <input type="radio" id="radio1" name="radioGroup" value="yes">
        <label for="radio1">Yes</label>
        <input type="radio" id="radio2" name="radioGroup" value="no">
        <label for="radio2">No</label>
        <br>
        <button type="submit">Submit Review</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
